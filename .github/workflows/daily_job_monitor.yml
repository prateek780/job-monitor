name: Daily Job Monitor

on:
  schedule:
    # 12:00 PM Nepal Time = 06:15 UTC  (Nepal is UTC+5:45)
    - cron: "15 6 * * *"

  # Allow manual trigger from Actions tab for testing
  workflow_dispatch:

jobs:
  run-job-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache pip dependencies so installs are fast on repeat runs
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore the SQLite database from the previous run so we never
      # re-email jobs that were already sent.
      - name: Restore seen-jobs database
        uses: actions/cache@v4
        with:
          path: jobs.db
          key: jobs-db-${{ github.run_id }}
          restore-keys: |
            jobs-db-

      - name: Run job monitor
        env:
          SMTP_HOST:  ${{ secrets.SMTP_HOST }}
          SMTP_PORT:  ${{ secrets.SMTP_PORT }}
          SMTP_USER:  ${{ secrets.SMTP_USER }}
          SMTP_PASS:  ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:   ${{ secrets.EMAIL_TO }}
        run: python main.py

      # Save the updated DB so tomorrow's run knows what was already sent.
      - name: Save seen-jobs database
        if: always()    # save even on partial failure
        uses: actions/cache/save@v4
        with:
          path: jobs.db
          key: jobs-db-${{ github.run_id }}
